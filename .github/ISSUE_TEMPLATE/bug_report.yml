name: Bug Report
description: Report a reproducible bug in Laralink
labels: ["bug", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behaviour.
      placeholder: |
        1. Run `php artisan laralink:dev ...`
        2. Enter '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: laralink_version
    attributes:
      label: Laralink Version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: laravel_version
    attributes:
      label: Laravel Version
      placeholder: e.g. 11.x
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP Version
      placeholder: e.g. 8.3
    validations:
      required: true
